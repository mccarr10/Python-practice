<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fixtures Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    padding: 15px;
    background: #f2f2f7;
    margin: 0;
  }

  /* Crest */
  .crest-container {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
  }

  .crest {
    width: 90px;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  h1 {
    text-align: center;
    margin: 0 0 20px;
    font-size: 26px;
    font-weight: 800;
    color: #111;
  }

  /* Premium dropdowns */
  .filters {
    display: flex;
    flex-direction: column;
    gap: 18px;
    background: #f2f2f7;
    padding-bottom: 16px;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  select {
    width: 100%;
    padding: 16px 18px;
    font-size: 18px;
    font-weight: 600;
    color: #111;
    background: #ffffff;
    border: 2px solid #e5e5ea;
    border-radius: 14px;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: all 0.2s ease;
    background-image: url('data:image/svg+xml;utf8,<svg fill="%23007aff" height="22" viewBox="0 0 24 24" width="22" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
    background-repeat: no-repeat;
    background-position: right 16px center;
    background-size: 22px;
  }

  select:focus {
    outline: none;
    border-color: #007aff;
    box-shadow: 0 0 0 3px rgba(0,122,255,0.25);
  }

  select:hover {
    border-color: #c7c7cc;
  }

  /* Match cards */
  #fixtureCards {
    margin-top: 10px;
  }

  .fixture-card {
    background: white;
    padding: 20px;
    margin: 16px 0;
    border-radius: 16px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
  }

  /* Left colour bar (home) */
  .fixture-card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 12px;
    height: 100%;
    background: var(--home-colour, #007aff);
  }

  /* Right colour bar (away) */
  .fixture-card::after {
    content: "";
    position: absolute;
    right: 0;
    top: 0;
    width: 12px;
    height: 100%;
    background: var(--away-colour, #ff3b30);
  }

  .fixture-header {
    font-size: 16px;
    font-weight: 600;
    color: #444;
    margin-bottom: 10px;
  }

  .fixture-teams {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #111;
  }

  .fixture-details {
    font-size: 16px;
    color: #333;
    line-height: 1.6;
  }
</style>
</head>

<body>

<div class="crest-container">
  <img src="IMG_5104.jpeg" alt="CSL Crest" class="crest">
</div>

<h1>U7–U11 Fixtures Viewer</h1>

<div class="filters">
  <select id="ageGroup"><option value="">Select Age Group</option></select>
  <select id="group"><option value="">Select Group</option></select>
  <select id="team"><option value="">Select Team</option></select>
</div>

<div id="fixtureCards"></div>

<script>
/* TEAM COLOURS */
const teamColours = {
  "Avondale United": ["#0033cc", "#ffffff"],
  "Ballincollig": ["#008000", "#ffffff"],
  "Ballinhassig": ["#0033cc", "#ffcc00"],
  "Bandon": ["#0033cc", "#ffffff"],
  "Carrigaline United": ["#ffcc00", "#0033cc"],
  "Carrigtwohill United": ["#0033cc", "#ffffff"],
  "Castleview": ["#cc0000", "#ffffff"],
  "Churchvilla": ["#cc0000", "#000000"],
  "Corkbeg": ["#ffffff", "#0033cc"],
  "Corinthian Boys": ["#cc0000", "#ffffff"],
  "Crosshaven": ["#0033cc", "#ffffff"],
  "Douglas Hall": ["#ffcc00", "#0033cc"],
  "Everton": ["#0033cc", "#ffffff"],
  "Fermoy": ["#ffcc00", "#000000"],
  "Grenagh United": ["#008000", "#ffffff"],
  "Innishvilla": ["#800000", "#ffffff"],
  "Kanturk": ["#008000", "#ffffff"],
  "Kilreen Celtic": ["#008000", "#ffffff"],
  "Kinsale": ["#000000", "#ffffff"],
  "Lakewood Athletic": ["#008000", "#ffffff"],
  "Leeds AFC": ["#0033cc", "#ffcc00"],
  "Leeside": ["#cc0000", "#000000"],
  "Los Zarcos": ["#0033cc", "#ffffff"],
  "Macroom": ["#008000", "#ffffff"],
  "Mallow United": ["#ffcc00", "#000000"],
  "Mallow Town": ["#0033cc", "#ffffff"],
  "Mayfield United": ["#cc0000", "#000000"],
  "Midleton": ["#000000", "#ffffff"],
  "Mogeely FC": ["#0033cc", "#ffffff"],
  "Park United": ["#cc0000", "#000000"],
  "Passage": ["#cc0000", "#000000"],
  "Pearse Celtic": ["#008000", "#ffffff"],
  "Riverstown": ["#0033cc", "#ffcc00"],
  "Ringmahon Rangers": ["#cc0000", "#000000"],
  "Rockmount": ["#ffcc00", "#000000"],
  "Springfield Ramblers": ["#0033cc", "#ffffff"],
  "St. Mary's": ["#008000", "#ffffff"],
  "Strand United": ["#0033cc", "#ffcc00"],
  "Tramore Athletic": ["#cc0000", "#000000"],
  "Watergrasshill United": ["#cc0000", "#000000"],
  "Wilton United": ["#0033cc", "#ffffff"],
  "Youghal United": ["#008000", "#ffffff"]
};

/* LOAD EXCEL */
const excelUrl =
  "https://raw.githubusercontent.com/mccarr10/Python-practice/main/U7%20to%20U11%20Fixtures%202026.xlsx";

let fixtures = [];

/* FETCH AND PARSE */
fetch(excelUrl)
  .then(r => r.arrayBuffer())
  .then(data => {
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

    parseHierarchicalData(rows);
    populateDropdowns();
    renderTable();
  });

/* PARSE FIXTURES INCLUDING MERGED GROUPS */
function parseHierarchicalData(rows) {
  let currentDate = "";
  let currentAge = "";
  let currentGroups = [];

  for (let row of rows) {
    if (!row || row.length === 0) continue;

    const first = row[0] ? row[0].toString().trim() : "";

    /* DATE ROW */
    if (/^(Saturday|Sunday|Monday|Tuesday|Wednesday|Thursday|Friday)/i.test(first)) {
      currentDate = first;
      continue;
    }

    /* AGE + GROUP ROW (supports merged groups) */
    if (/^U\d+\s+G[\d\/&-]+\s+2026$/i.test(first)) {
      const parts = first.split(" ");
      currentAge = parts[0];

      const groupString = parts[1].replace("G", "");
      currentGroups = groupString
        .split(/[/&-]/)
        .map(g => "G" + g.trim());

      continue;
    }

    /* FIXTURE ROW */
    if (row.length >= 4 && row[1] && row[2] && row[3]) {
      fixtures.push({
        date: currentDate,
        age: currentAge,
        groups: currentGroups,
        home: row[0],
        away: row[1],
        venue: row[2],
        time: row[3]
      });
    }
  }
}

/* POPULATE DROPDOWNS */
function populateDropdowns() {
  const ageSelect = document.getElementById("ageGroup");
  const groupSelect = document.getElementById("group");
  const teamSelect = document.getElementById("team");

  const ages = [...new Set(fixtures.map(f => f.age))].sort();
  ageSelect.innerHTML = `<option value="">Select Age Group</option>` +
    ages.map(a => `<option value="${a}">${a}</option>`).join("");

  ageSelect.onchange = () => {
    const selectedAge = ageSelect.value;

    const groups = [...new Set(
      fixtures
        .filter(f => f.age === selectedAge)
        .flatMap(f => f.groups)
    )].sort();

    groupSelect.innerHTML = `<option value="">Select Group</option>` +
      groups.map(g => `<option value="${g}">${g}</option>`).join("");

    teamSelect.innerHTML = `<option value="">Select Team</option>`;
    renderTable();
  };

  groupSelect.onchange = () => {
    const selectedAge = ageSelect.value;
    const selectedGroup = groupSelect.value;

    const teams = [...new Set(
      fixtures
        .filter(f => f.age === selectedAge && f.groups.includes(selectedGroup))
        .flatMap(f => [f.home, f.away])
    )].sort();

    teamSelect.innerHTML = `<option value="">Select Team</option>` +
      teams.map(t => `<option value="${t}">${t}</option>`).join("");

    renderTable();
  };

  teamSelect.onchange = renderTable;
}

/* RENDER MATCH CARDS */
function renderTable() {
  const age = document.getElementById("ageGroup").value;
  const group = document.getElementById("group").value;
  const team = document.getElementById("team").value;

  const container = document.getElementById("fixtureCards");

  const filtered = fixtures.filter(f =>
    (!age || f.age === age) &&
    (!group || f.groups.includes(group)) &&
    (!team || f.home === team || f.away === team)
  );

  container.innerHTML = filtered.map(f => {
    const homeColours = teamColours[f.home] || ["#007aff", "#ffffff"];
    const awayColours = teamColours[f.away] || ["#ff3b30", "#ffffff"];

    const homePrimary = homeColours[0];
    const awayPrimary = awayColours[0];

    return `
      <div class="fixture-card"
           style="--home-colour:${homePrimary}; --away-colour:${awayPrimary}">
        <div class="fixture-header">${f.age} • ${f.groups.join("/")} • ${f.date}</div>
        <div class="fixture-teams">
          ${f.home} <span style="color:#111">vs</span> ${f.away}
        </div>
        <div class="fixture-details">
          <strong>Venue:</strong> ${f.venue}<br>
          <strong>Time:</strong> ${f.time}
        </div>
      </div>
    `;
  }).join("");
}
</script>

</body>
</html>
