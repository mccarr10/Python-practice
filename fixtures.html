<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fixtures Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    padding: 15px;
    background: #f2f2f7;
    margin: 0;
  }

  h1 {
    text-align: center;
    margin: 0 0 20px;
    font-size: 24px;
    font-weight: 700;
    color: #111;
  }

  .filters {
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: sticky;
    top: 0;
    background: #f2f2f7;
    padding-bottom: 10px;
    z-index: 10;
  }

  select {
  padding: 16px;
  font-size: 17px;
  border-radius: 14px;
  border: 1px solid #d1d1d6;
  background: #ffffff;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  width: 100%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  background-image: url('data:image/svg+xml;utf8,<svg fill="%23666" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
  background-repeat: no-repeat;
  background-position: right 14px center;
  background-size: 18px;
}


  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 14px;
    overflow: hidden;
    margin-top: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }

  th {
    background: #007aff;
    color: white;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
  }

  td {
    padding: 12px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }

  tr:last-child td {
    border-bottom: none;
  }

  tr:nth-child(even) {
    background: #fafafa;
  }
  .fixture-card {
  background: white;
  padding: 20px;
  margin: 16px 0;
  border-radius: 16px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.fixture-header {
  font-size: 16px;
  font-weight: 600;
  color: #444;
  margin-bottom: 10px;
}

.fixture-teams {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 10px;
  color: #111;
}

.fixture-details {
  font-size: 16px;
  color: #333;
  line-height: 1.6;
}


.fixture-header {
  font-size: 14px;
  font-weight: 600;
  color: #555;
  margin-bottom: 8px;
}

.fixture-teams {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
}

.fixture-details {
  font-size: 14px;
  color: #333;
  line-height: 1.4;
}
.crest-container {
  display: flex;
  justify-content: center;
  margin-bottom: 10px;
}

.crest {
  width: 90px;        /* perfect size for iPhone */
  height: auto;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

</style>
</head>

<body>
<div class="crest-container">
  <img src="IMG_5104.jpeg" alt="CSL Crest" class="crest">
</div>


<h1>U7–U11 Fixtures Viewer</h1>

<div class="filters">
  <select id="ageGroup"><option value="">Select Age Group</option></select>
  <select id="group"><option value="">Select Group</option></select>
  <select id="team"><option value="">Select Team</option></select>
</div>

<div id="fixtureCards"></div>

<script>
const excelUrl =
  "https://raw.githubusercontent.com/mccarr10/Python-practice/main/U7%20to%20U11%20Fixtures%202026.xlsx";

let fixtures = [];

fetch(excelUrl)
  .then(r => r.arrayBuffer())
  .then(data => {
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

    parseHierarchicalData(rows);
    populateDropdowns();
    renderTable();
  });

function parseHierarchicalData(rows) {
  let currentDate = "";
  let currentAge = "";
  let currentGroup = "";

  for (let row of rows) {
    if (!row || row.length === 0) continue;

    const first = row[0] ? row[0].toString().trim() : "";

    // Detect date rows (start with weekday)
    if (/^(Saturday|Sunday|Monday|Tuesday|Wednesday|Thursday|Friday)/i.test(first)) {
      currentDate = first;
      continue;
    }

    // Detect age-group rows (U7 G1/G2 2026)
    if (/^U\d+\s+G[\d/]+\s+2026$/i.test(first)) {
      const parts = first.split(" ");
      currentAge = parts[0];      // U7
      currentGroup = parts[1];    // G1/G2
      continue;
    }

    // Detect fixture rows (Home | Away | Venue | Time)
    if (row.length >= 4 && row[1] && row[2] && row[3]) {
      fixtures.push({
        date: currentDate,
        age: currentAge,
        group: currentGroup,
        home: row[0],
        away: row[1],
        venue: row[2],
        time: row[3]
      });
    }
  }
}

function populateDropdowns() {
  const ageSelect = document.getElementById("ageGroup");
  const groupSelect = document.getElementById("group");
  const teamSelect = document.getElementById("team");

  const ages = [...new Set(fixtures.map(f => f.age))].sort();
  ageSelect.innerHTML = `<option value="">Select Age Group</option>` +
    ages.map(a => `<option value="${a}">${a}</option>`).join("");

  ageSelect.onchange = () => {
    const selectedAge = ageSelect.value;

    const groups = [...new Set(
      fixtures.filter(f => f.age === selectedAge).map(f => f.group)
    )].sort();

    groupSelect.innerHTML = `<option value="">Select Group</option>` +
      groups.map(g => `<option value="${g}">${g}</option>`).join("");

    teamSelect.innerHTML = `<option value="">Select Team</option>`;
    renderTable();
  };

  groupSelect.onchange = () => {
    const selectedAge = ageSelect.value;
    const selectedGroup = groupSelect.value;

    const teams = [...new Set(
      fixtures
        .filter(f => f.age === selectedAge && f.group === selectedGroup)
        .flatMap(f => [f.home, f.away])
    )].sort();

    teamSelect.innerHTML = `<option value="">Select Team</option>` +
      teams.map(t => `<option value="${t}">${t}</option>`).join("");

    renderTable();
  };

  teamSelect.onchange = renderTable;
}

function renderTable() {
  const age = document.getElementById("ageGroup").value;
  const group = document.getElementById("group").value;
  const team = document.getElementById("team").value;

  const container = document.getElementById("fixtureCards");

  const filtered = fixtures.filter(f =>
    (!age || f.age === age) &&
    (!group || f.group === group) &&
    (!team || f.home === team || f.away === team)
  );

  container.innerHTML = filtered.map(f => `
    <div class="fixture-card">
      <div class="fixture-header">${f.age} • ${f.group} • ${f.date}</div>
      <div class="fixture-teams">${f.home} vs ${f.away}</div>
      <div class="fixture-details">
        <strong>Venue:</strong> ${f.venue}<br>
        <strong>Time:</strong> ${f.time}
      </div>
    </div>
  `).join("");
}
</script>

</body>
</html>
