<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fixtures Viewer</title>

<!-- SheetJS library for reading Excel files -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
  }

  .filters {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  select {
    padding: 10px;
    font-size: 16px;
    min-width: 180px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-top: 20px;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
  }

  th {
    background: #2e8b57;
    color: white;
  }

  tr:nth-child(even) {
    background: #f9f9f9;
  }
</style>
</head>

<body>

<h1>U7–U11 Fixtures Viewer</h1>

<div class="filters">
  <select id="ageGroup">
    <option value="">Select Age Group</option>
  </select>

  <select id="group">
    <option value="">Select Group</option>
  </select>

  <select id="team">
    <option value="">Select Team</option>
  </select>
</div>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Age Group</th>
      <th>Group</th>
      <th>Home</th>
      <th>Away</th>
      <th>Venue</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="fixturesBody"></tbody>
</table>

<script>
/* ---------------------------------------------------------
   LOAD EXCEL FILE FROM GITHUB
--------------------------------------------------------- */

const excelUrl = "https://raw.githubusercontent.com/mccarr10/Python-practice/main/U7%20to%20U11%20Fixtures%202026.xlsx";
let fixtures = [];

fetch(excelUrl)
  .then(response => response.arrayBuffer())
  .then(data => {
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);

    fixtures = rows.map(r => ({
      date: r.Date || "",
      age: cleanAge(r["Age Group"] || ""),
      group: cleanGroup(r["Age Group"] || ""),
      home: r.Home || "",
      away: r.Away || "",
      venue: r.Venue || "",
      time: r.Time || ""
    }));

    populateDropdowns();
    renderTable();
  });

/* ---------------------------------------------------------
   CLEAN AGE GROUP LABELS (Option B)
--------------------------------------------------------- */

function cleanAge(label) {
  const match = label.match(/U\d+/);
  return match ? match[0] : label;
}

function cleanGroup(label) {
  const match = label.match(/G\d+/);
  return match ? match[0] : "";
}

/* ---------------------------------------------------------
   POPULATE DROPDOWNS (Option C)
--------------------------------------------------------- */

function populateDropdowns() {
  const ageSelect = document.getElementById("ageGroup");
  const groupSelect = document.getElementById("group");
  const teamSelect = document.getElementById("team");

  const ages = [...new Set(fixtures.map(f => f.age))].sort();
  ageSelect.innerHTML = `<option value="">Select Age Group</option>` +
    ages.map(a => `<option value="${a}">${a}</option>`).join("");

  ageSelect.onchange = () => {
    const selectedAge = ageSelect.value;

    const groups = [...new Set(
      fixtures.filter(f => f.age === selectedAge).map(f => f.group)
    )].sort();

    groupSelect.innerHTML = `<option value="">Select Group</option>` +
      groups.map(g => `<option value="${g}">${g}</option>`).join("");

    teamSelect.innerHTML = `<option value="">Select Team</option>`;
    renderTable();
  };

  groupSelect.onchange = () => {
    const selectedAge = ageSelect.value;
    const selectedGroup = groupSelect.value;

    const teams = [...new Set(
      fixtures
        .filter(f => f.age === selectedAge && f.group === selectedGroup)
        .flatMap(f => [f.home, f.away])
    )].sort();

    teamSelect.innerHTML = `<option value="">Select Team</option>` +
      teams.map(t => `<option value="${t}">${t}</option>`).join("");

    renderTable();
  };

  teamSelect.onchange = renderTable;
}

/* ---------------------------------------------------------
   RENDER TABLE
--------------------------------------------------------- */

function renderTable() {
  const age = document.getElementById("ageGroup").value;
  const group = document.getElementById("group").value;
  const team = document.getElementById("team").value;

  const tbody = document.getElementById("fixturesBody");

  const filtered = fixtures.filter(f =>
    (!age || f.age === age) &&
    (!group || f.group === group) &&
    (!team || f.home === team || f.away === team)
  );

  tbody.innerHTML = filtered.map(f => `
    <tr>
      <td>${f.date}</td>
      <td>${f.age}</td>
      <td>${f.group}</td>
      <td>${f.home}</td>
      <td>${f.away}</td>
      <td>${f.venue}</td>
      <td>${f.time}</td>
    </tr>
  `).join("");
}
</script>

</body>
</html>
